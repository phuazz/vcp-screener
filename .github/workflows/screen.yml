name: Nightly VCP screen

# Runs the screener after the US cash close and republishes the dashboard.
#
# Schedule is in UTC (GitHub Actions cron is always UTC, five fields:
# minute hour day-of-month month day-of-week). 01:00 UTC Tue-Sat corresponds to
# the evening of each US trading session (Mon-Fri, after the 16:00 ET close in
# both EST and EDT), so each run screens that day's completed EOD bars.
on:
  schedule:
    - cron: "0 1 * * 2-6"
  workflow_dispatch: {}        # allow manual runs from the Actions tab

# The job pushes the rebuilt docs/ back to main, so it needs write access.
permissions:
  contents: write

concurrency:
  group: nightly-screen
  cancel-in-progress: false

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run screen and build dashboard
        run: |
          python run_screen.py --no-cache
          python scripts/pipeline.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --cached --quiet; then
            echo "No change to publish."
          else
            git commit -m "Auto-update VCP screen $(date -u +%Y-%m-%d)"
            git push
          fi
